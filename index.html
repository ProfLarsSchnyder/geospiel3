<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Schweizer Geografie-Abenteuer</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef7ff;color:#123}
header{background:white;padding:18px 24px;box-shadow:0 4px 18px #0002;font-size:24px;font-weight:bold}
main{display:grid;grid-template-columns:330px 1fr;gap:20px;padding:20px}
.panel{background:white;border-radius:24px;padding:22px;box-shadow:0 10px 25px #0002}
#mapBox{background:white;border-radius:24px;padding:16px;box-shadow:0 10px 25px #0002;overflow:auto;height:calc(100vh - 120px)}
#map svg{width:100%;height:auto;display:block}
.map-path{cursor:default;transition:.12s}
.clickable-canton{cursor:pointer}
.group-hover{filter:brightness(1.18);stroke:#2563eb!important;stroke-width:2.5!important}
.group-selected{fill:#22c55e!important;stroke:#15803d!important;stroke-width:3!important}
#map text,#map tspan{pointer-events:none!important}
.small{font-size:13px;color:#456}
</style>
</head>
<body>

<header>🗺️ Schweizer Geografie-Abenteuer</header>

<main>
<section class="panel">
<h2>Kartentest</h2>
<p>Klicke auf einen Kanton.</p>
<p id="info">Karte wird geladen...</p>
<hr>
<p class="small">
Nur zugeordnete Kantonsflächen reagieren. Seen, Grenzen, Länder, kleine Innenflächen und nicht zugewiesene Flächen lösen nichts aus.
</p>
</section>

<section id="mapBox">
<div id="map"></div>
</section>
</main>

<script>
const CANTONS = {
  GE:{name:"Genf",parts:[63,385,386,387,388]},
  VD:{name:"Waadt",parts:[60,370,371,372,373]},
  NE:{name:"Neuenburg",parts:[58,377,378,379,380,381,382,383,384]},
  FR:{name:"Freiburg",parts:[57,59,330,331,332,333,334,335,336]},
  BE:{name:"Bern",parts:[61,308,309,310,311]},
  JU:{name:"Jura",parts:[62,389,390,391,392]},
  SO:{name:"Solothurn",parts:[54,55,492,493]},
  BL:{name:"Basel-Landschaft",parts:[51,56,496]},
  BS:{name:"Basel-Stadt",parts:[52,494,495]},
  AG:{name:"Aargau",parts:[48,353,354,355,356,357,358]},
  LU:{name:"Luzern",parts:[47,312,313,314,315]},
  VS:{name:"Wallis",parts:[45,374,375,376]},
  OW:{name:"Obwalden",parts:[49,50,491]},
  NW:{name:"Nidwalden",parts:[44]},
  UR:{name:"Uri",parts:[43,316,317,318]},
  TI:{name:"Tessin",parts:[37,365,366,367,368,369]},
  SZ:{name:"Schwyz",parts:[46,319,320,321,322]},
  ZG:{name:"Zug",parts:[39,328,329]},
  ZH:{name:"Zürich",parts:[42,303,304,305,306,307]},
  GL:{name:"Glarus",parts:[36,323,324,325,326,327]},
  SH:{name:"Schaffhausen",parts:[38,40,281]},
  TG:{name:"Thurgau",parts:[41,359,360,361,362,363,364]},
  SG:{name:"St. Gallen",parts:[35,337,338,339,340,341,342]},
  AI:{name:"Appenzell Innerrhoden",parts:[34,500]},
  AR:{name:"Appenzell Ausserrhoden",parts:[498,499]},
  GR:{name:"Graubünden",parts:[33,343,344,345,346,347,348,349,350,351,352]}
};

const IGNORE_PARTS = new Set([67,68]);

const PART_TO_CANTON = {};
Object.entries(CANTONS).forEach(([id,canton])=>{
  canton.parts.forEach(n=>PART_TO_CANTON[n]=id);
});

let pathParts = [];

fetch("karte.svg")
.then(r=>{
  if(!r.ok) throw new Error("karte.svg nicht gefunden");
  return r.text();
})
.then(svg=>{
  document.getElementById("map").innerHTML = svg;
  setupMap();
})
.catch(err=>{
  document.getElementById("info").textContent =
    "Karte konnte nicht geladen werden. Prüfe, ob die Datei genau karte.svg heisst.";
  console.error(err);
});

function setupMap(){
  document.querySelectorAll("#map text,#map tspan").forEach(el=>{
    el.style.pointerEvents = "none";
  });

  pathParts = [...document.querySelectorAll("#map svg path")];

  pathParts.forEach((el,index)=>{
    const nr = index + 1;
    el.dataset.partNr = nr;
    el.classList.add("map-path");

    const cantonId = PART_TO_CANTON[nr];

    if(cantonId && !IGNORE_PARTS.has(nr)){
      el.classList.add("clickable-canton");

      el.addEventListener("mouseenter",()=>{
        highlightCanton(cantonId,true);
      });

      el.addEventListener("mouseleave",()=>{
        highlightCanton(cantonId,false);
      });

      el.addEventListener("click",e=>{
        e.stopPropagation();
        selectCanton(cantonId,nr);
      });
    }else{
      el.style.pointerEvents = "none";
    }
  });

  document.getElementById("info").textContent =
    "Karte geladen. 26 Kantone sind zugeordnet.";
}

function highlightCanton(cantonId,on){
  CANTONS[cantonId].parts.forEach(n=>{
    const el = pathParts[n-1];
    if(el) el.classList.toggle("group-hover",on);
  });
}

function selectCanton(cantonId,clickedPart){
  document.querySelectorAll(".group-selected").forEach(x=>{
    x.classList.remove("group-selected");
  });

  CANTONS[cantonId].parts.forEach(n=>{
    const el = pathParts[n-1];
    if(el) el.classList.add("group-selected");
  });

  document.getElementById("info").textContent =
    "Gewählt: " + CANTONS[cantonId].name + " (" + cantonId + ") über Fläche " + clickedPart;
}
</script>

</body>
</html>
