<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Schweizer Geografie-Abenteuer</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef7ff;color:#123}
header{background:white;padding:18px 24px;box-shadow:0 4px 18px #0002;font-size:24px;font-weight:bold}
main{display:grid;grid-template-columns:340px 1fr;gap:20px;padding:20px}
.panel{background:white;border-radius:24px;padding:22px;box-shadow:0 10px 25px #0002}
#mapBox{background:white;border-radius:24px;padding:16px;box-shadow:0 10px 25px #0002;overflow:auto;height:calc(100vh - 120px)}
#mapWrap{position:relative}
#map svg{width:100%;height:auto;display:block}
#extraHitLayer{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none}
.extra-hit{fill:transparent;stroke:transparent;stroke-width:3;pointer-events:auto;cursor:pointer}
.extra-hit:hover{fill:#2563eb44;stroke:#2563eb}
.extra-hit.selected{fill:#22c55e88;stroke:#15803d;stroke-width:4}
.map-path{cursor:default;transition:.12s}
.clickable-canton{cursor:pointer}
.group-hover{filter:brightness(1.18);stroke:#2563eb!important;stroke-width:2.5!important}
.group-selected{fill:#22c55e!important;stroke:#15803d!important;stroke-width:3!important}
.debug-hover{stroke:#ff006e!important;stroke-width:4!important;filter:brightness(1.25)}
#map text,#map tspan{pointer-events:none!important}
.small{font-size:13px;color:#456;line-height:1.4}
code{background:#eef;padding:2px 5px;border-radius:6px}
</style>
</head>
<body>
<header>🗺️ Schweizer Geografie-Abenteuer</header>

<main>
<section class="panel">
<h2>Kartentest</h2>
<p>Klicke auf einen Kanton.</p>
<p id="info">Karte wird geladen...</p>
<hr>
<p class="small">
AR hat jetzt eine zusätzliche unsichtbare Klickfläche. Falls sie leicht daneben liegt, sag mir: links/rechts/oben/unten oder grösser/kleiner.
</p>
<p class="small" id="debug">Aktuelle Fläche: –</p>
</section>

<section id="mapBox">
<div id="mapWrap">
  <div id="map"></div>
  <svg id="extraHitLayer" viewBox="0 0 800 538" preserveAspectRatio="xMidYMid meet">
    <ellipse id="arExtraHit" class="extra-hit" cx="650" cy="150" rx="20" ry="13"></ellipse>
  </svg>
</div>
</section>
</main>

<script>
const CANTONS = {
  GE:{name:"Genf",parts:[63,385,386,387,388],paint:[63]},
  VD:{name:"Waadt",parts:[60,370,371,372,373],paint:[60]},
  NE:{name:"Neuenburg",parts:[58,377,378,379,380,381,382,383,384],paint:[58]},
  FR:{name:"Freiburg",parts:[57,59,330,331,332,333,334,335,336],paint:[57,59]},
  BE:{name:"Bern",parts:[61,308,309,310,311],paint:[61]},
  JU:{name:"Jura",parts:[62,389,390,391,392],paint:[62]},
  SO:{name:"Solothurn",parts:[54,55,492,493],paint:[54,55]},
  BL:{name:"Basel-Landschaft",parts:[51,56,496],paint:[51,56]},
  BS:{name:"Basel-Stadt",parts:[52,494,495],paint:[52]},
  AG:{name:"Aargau",parts:[48,353,354,355,356,357,358],paint:[48]},
  LU:{name:"Luzern",parts:[47,312,313,314,315],paint:[47]},
  VS:{name:"Wallis",parts:[45,374,375,376],paint:[45]},
  OW:{name:"Obwalden",parts:[49,50,491],paint:[49,50]},
  NW:{name:"Nidwalden",parts:[44],paint:[44]},
  UR:{name:"Uri",parts:[43,316,317,318],paint:[43]},
  TI:{name:"Tessin",parts:[37,365,366,367,368,369],paint:[37]},
  SZ:{name:"Schwyz",parts:[46,319,320,321,322],paint:[46]},
  ZG:{name:"Zug",parts:[39,328,329],paint:[39]},
  ZH:{name:"Zürich",parts:[42,303,304,305,306,307],paint:[42]},
  GL:{name:"Glarus",parts:[36,323,324,325,326,327],paint:[36]},
  SH:{name:"Schaffhausen",parts:[38,40,281],paint:[38,40]},
  TG:{name:"Thurgau",parts:[41,359,360,361,362,363,364],paint:[41]},
  SG:{name:"St. Gallen",parts:[35,337,338,339,340,341,342],paint:[35]},
  AI:{name:"Appenzell Innerrhoden",parts:[34,500],paint:[34]},
  AR:{name:"Appenzell Ausserrhoden",parts:[],paint:["AR_EXTRA"]},
  GR:{name:"Graubünden",parts:[33,343,344,345,346,347,348,349,350,351,352],paint:[33]}
};

const IGNORE_PARTS = new Set([67,68]);

const PART_TO_CANTON = {};
Object.entries(CANTONS).forEach(([id,canton])=>{
  canton.parts.forEach(n=>PART_TO_CANTON[n]=id);
});

let pathParts = [];

fetch("karte.svg")
.then(r=>{
  if(!r.ok) throw new Error("karte.svg nicht gefunden");
  return r.text();
})
.then(svg=>{
  document.getElementById("map").innerHTML = svg;
  setupMap();
  setupExtraHits();
})
.catch(err=>{
  document.getElementById("info").textContent =
    "Karte konnte nicht geladen werden. Prüfe, ob die Datei genau karte.svg heisst.";
  console.error(err);
});

function setupMap(){
  document.querySelectorAll("#map text,#map tspan").forEach(el=>{
    el.style.pointerEvents = "none";
  });

  pathParts = [...document.querySelectorAll("#map svg path")];

  pathParts.forEach((el,index)=>{
    const nr = index + 1;
    el.dataset.partNr = nr;
    el.classList.add("map-path");

    el.addEventListener("mouseenter",()=>{
      document.getElementById("debug").innerHTML =
        "Aktuelle Fläche: <code>" + nr + "</code>";
      el.classList.add("debug-hover");

      const cantonId = PART_TO_CANTON[nr];
      if(cantonId && !IGNORE_PARTS.has(nr)){
        highlightCanton(cantonId,true);
      }
    });

    el.addEventListener("mouseleave",()=>{
      el.classList.remove("debug-hover");

      const cantonId = PART_TO_CANTON[nr];
      if(cantonId && !IGNORE_PARTS.has(nr)){
        highlightCanton(cantonId,false);
      }
    });

    el.addEventListener("click",e=>{
      e.stopPropagation();

      const cantonId = PART_TO_CANTON[nr];

      if(!cantonId || IGNORE_PARTS.has(nr)){
        return;
      }

      selectCanton(cantonId,nr);
    });

    if(PART_TO_CANTON[nr] && !IGNORE_PARTS.has(nr)){
      el.classList.add("clickable-canton");
    }
  });

  document.getElementById("info").textContent =
    "Karte geladen. 26 Kantone sind vorbereitet. AR-Spezialfläche aktiv.";
}

function setupExtraHits(){
  const ar = document.getElementById("arExtraHit");

  ar.addEventListener("mouseenter",()=>{
    document.getElementById("debug").innerHTML = "Extra-Fläche: <code>AR_EXTRA</code>";
    highlightCanton("AR",true);
  });

  ar.addEventListener("mouseleave",()=>{
    highlightCanton("AR",false);
  });

  ar.addEventListener("click",e=>{
    e.stopPropagation();
    selectCanton("AR","AR_EXTRA");
  });
}

function getPaintParts(cantonId){
  const c = CANTONS[cantonId];
  return c.paint && c.paint.length ? c.paint : c.parts;
}

function highlightCanton(cantonId,on){
  getPaintParts(cantonId).forEach(n=>{
    if(n==="AR_EXTRA"){
      const ar = document.getElementById("arExtraHit");
      if(ar) ar.classList.toggle("selected",on);
      return;
    }
    const el = pathParts[n-1];
    if(el) el.classList.toggle("group-hover",on);
  });
}

function selectCanton(cantonId,clickedPart){
  document.querySelectorAll(".group-selected").forEach(x=>{
    x.classList.remove("group-selected");
  });
  document.querySelectorAll(".extra-hit.selected").forEach(x=>{
    x.classList.remove("selected");
  });

  getPaintParts(cantonId).forEach(n=>{
    if(n==="AR_EXTRA"){
      const ar = document.getElementById("arExtraHit");
      if(ar) ar.classList.add("selected");
      return;
    }
    const el = pathParts[n-1];
    if(el) el.classList.add("group-selected");
  });

  document.getElementById("info").textContent =
    "Gewählt: " + CANTONS[cantonId].name + " (" + cantonId + ") über Fläche " + clickedPart;
}
</script>

</body>
</html>
